<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Sterlingcrest Limited</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta name="theme-color" content="#002E9D" />
    <link rel="stylesheet" href="./css/w3.css" />
    <link rel="stylesheet" href="./css/colors.css" />
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/get-started.css" />
    <style>
      #reset-card {
        background-color: rgb(30, 30, 30) !important;
        color: white !important;
      }
      .input-container {
        background-color: rgb(37, 37, 37) !important;
        color: white !important;
      }
      .fa {
        color: rgba(255, 255, 255, 0.552) !important;
      }
      ::placeholder {
        color: rgba(255, 255, 255, 0.562) !important;
        opacity: 1 !important;
      }
      .input {
        color: white !important;
      }
      .w3-white {
        background-color: rgb(16, 16, 16) !important;
        color: white !important;
      }
    </style>
    <div class="gtranslate_wrapper"></div>
    <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper"}</script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
  </head>
  <body style="background-color: black;">
    <section>
      <div class="w3-center w3-padding w3-padding-48">
        <div id="reset-card" class="w3-center w3-padding w3-padding-48 w3-white card-form" style="max-width: 480px; margin: 0 auto;">
          <p class="large" style="line-height: 35px;">
            Set new password
          </p>
          <p class="big">Reset your password</p>
          <p class="small" style="margin-bottom: 24px;">
            Enter your new password below.
          </p>

          <div class="input-container grey-background w3-round w3-margin">
            <span class="fa fa-lock grey-text"></span>
            <input
              class="input"
              type="password"
              id="new-password"
              placeholder="New password"
              autocomplete="new-password"
            />
          </div>
          <div class="input-container grey-background w3-round w3-margin">
            <span class="fa fa-lock grey-text"></span>
            <input
              class="input"
              type="password"
              id="confirm-password"
              placeholder="Confirm new password"
              autocomplete="new-password"
            />
          </div>

          <p id="error-msg" class="w3-text-red w3-center small w3-padding" style="display: none;"></p>
          <p id="success-msg" class="w3-text-green w3-center small w3-padding" style="display: none;"></p>

          <div
            id="submit-btn"
            class="w3-margin blue-background-inactive w3-padding-large w3-center w3-round pointer"
            style="width: 90%; border: none; margin-left: 5% !important;">
            Update password
          </div>

          <div class="w3-margin-top w3-padding">
            <a href="./get-started.html" class="small" style="color: rgba(255,255,255,0.8);">Back to sign in</a>
          </div>
        </div>

        <div id="invalid-link" class="w3-center w3-padding w3-padding-48" style="max-width: 480px; margin: 0 auto; display: none;">
          <p class="large" style="color: white;">Invalid or missing reset link</p>
          <p class="small" style="color: rgba(255,255,255,0.8);">Please request a new password reset from the sign in page.</p>
          <a href="./forgot-password.html" class="w3-margin-top w3-padding blue-background-light w3-round pointer" style="display: inline-block; text-decoration: none; color: white;">Forgot password</a>
        </div>
      </div>
    </section>

    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var email = params.get("id");

        var resetCard = document.getElementById("reset-card");
        var invalidLink = document.getElementById("invalid-link");

        if (!email || !email.trim()) {
          resetCard.style.display = "none";
          invalidLink.style.display = "block";
          return;
        }

        email = email.trim();

        var newPasswordInput = document.getElementById("new-password");
        var confirmPasswordInput = document.getElementById("confirm-password");
        var submitBtn = document.getElementById("submit-btn");
        var errorEl = document.getElementById("error-msg");
        var successEl = document.getElementById("success-msg");

        function showError(text) {
          successEl.style.display = "none";
          errorEl.textContent = text;
          errorEl.style.display = "block";
        }

        function showSuccess(text) {
          errorEl.style.display = "none";
          successEl.textContent = text;
          successEl.style.display = "block";
        }

        function setLoading(loading) {
          if (loading) {
            submitBtn.innerHTML = "<span class='fa fa-spinner w3-text-white fa-spin w3-large'></span>";
            submitBtn.style.pointerEvents = "none";
          } else {
            submitBtn.innerHTML = "Update password";
            submitBtn.style.pointerEvents = "";
          }
        }

        function validate() {
          var pwd = newPasswordInput.value;
          var confirm = confirmPasswordInput.value;
          if (!pwd || pwd.length < 6) {
            showError("Password must be at least 6 characters.");
            return false;
          }
          if (pwd !== confirm) {
            showError("Passwords do not match.");
            return false;
          }
          errorEl.style.display = "none";
          return true;
        }

        newPasswordInput.addEventListener("input", function() { errorEl.style.display = "none"; });
        confirmPasswordInput.addEventListener("input", function() { errorEl.style.display = "none"; });

        newPasswordInput.addEventListener("input", checkCanSubmit);
        confirmPasswordInput.addEventListener("input", checkCanSubmit);
        function checkCanSubmit() {
          if (newPasswordInput.value && confirmPasswordInput.value) {
            submitBtn.classList.remove("blue-background-inactive");
            submitBtn.classList.add("blue-background-light");
          } else {
            submitBtn.classList.remove("blue-background-light");
            submitBtn.classList.add("blue-background-inactive");
          }
        }

        submitBtn.addEventListener("click", function() {
          if (!validate()) return;

          setLoading(true);

          var xhr = new XMLHttpRequest();
          xhr.open("PUT", "/reset-password", true);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.send(JSON.stringify({
            email: email,
            password: newPasswordInput.value
          }));

          xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;
            setLoading(false);
            if (xhr.status === 200) {
              var ok = JSON.parse(xhr.responseText);
              if (ok) {
                showSuccess("Your password has been updated. You can now sign in.");
                newPasswordInput.value = "";
                confirmPasswordInput.value = "";
                submitBtn.classList.remove("blue-background-light");
                submitBtn.classList.add("blue-background-inactive");
                setTimeout(function() {
                  window.location.href = "./get-started.html?email=" + encodeURIComponent(email);
                }, 2000);
              } else {
                showError("Unable to update password. The link may be invalid or expired.");
              }
            } else {
              showError("Something went wrong. Please try again.");
            }
          };
        });
      })();
    </script>
  </body>
</html>
